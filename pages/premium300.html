<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoCapas — Capa Premium 300</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>

<body>
  <div data-include="/components/navbar.html"></div>

  <main class="products-page">
    <header class="products-hero">
      <div class="container">
        <div class="products-hero-inner">
          <div class="kicker mb-2" data-products-kicker>Catálogo</div>
          <h1 class="products-title" data-products-title>PRODUTOS</h1>
          <div class="products-line"></div>
          <p class="products-sub" data-products-sub></p>
        </div>
      </div>
    </header>

    <section class="section pt-0">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
          <div class="small-muted" data-products-info>Carregando...</div>
          <div class="d-flex align-items-center gap-2">
            <a class="btn btn-gold px-3" href="/pages/cart.html">Ver carrinho</a>
          </div>
        </div>

        <div class="row g-3" data-products-skeleton>
          <div class="col-12 col-sm-6 col-lg-4 col-xl-3"><div class="card-dark p-4"><div class="skeleton skeleton-media mb-3"></div><div class="skeleton skeleton-line w-75 mb-2"></div><div class="skeleton skeleton-line w-50 mb-3"></div><div class="skeleton skeleton-line w-100 mb-2"></div><div class="skeleton skeleton-line w-90"></div></div></div>
          <div class="col-12 col-sm-6 col-lg-4 col-xl-3"><div class="card-dark p-4"><div class="skeleton skeleton-media mb-3"></div><div class="skeleton skeleton-line w-75 mb-2"></div><div class="skeleton skeleton-line w-50 mb-3"></div><div class="skeleton skeleton-line w-100 mb-2"></div><div class="skeleton skeleton-line w-90"></div></div></div>
          <div class="col-12 col-sm-6 col-lg-4 col-xl-3"><div class="card-dark p-4"><div class="skeleton skeleton-media mb-3"></div><div class="skeleton skeleton-line w-75 mb-2"></div><div class="skeleton skeleton-line w-50 mb-3"></div><div class="skeleton skeleton-line w-100 mb-2"></div><div class="skeleton skeleton-line w-90"></div></div></div>
          <div class="col-12 col-sm-6 col-lg-4 col-xl-3 d-none d-xl-block"><div class="card-dark p-4"><div class="skeleton skeleton-media mb-3"></div><div class="skeleton skeleton-line w-75 mb-2"></div><div class="skeleton skeleton-line w-50 mb-3"></div><div class="skeleton skeleton-line w-100 mb-2"></div><div class="skeleton skeleton-line w-90"></div></div></div>
        </div>

        <div class="row g-3" data-products-grid style="display:none;"></div>

        <div class="panel p-4 p-md-5 mt-4" data-products-empty style="display:none;">
          <div class="kicker mb-2">Nada por aqui</div>
          <h3 class="fw-bold mb-2">Sem itens nessa linha</h3>
          <p class="text-secondary mb-0">Tente outra categoria no topo.</p>
        </div>
      </div>
    </section>
  </main>

  <div data-include="/components/footer.html"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { includePartials } from "../assets/js/includes.js";
    import { bootstrapCartUI } from "../assets/js/cart.js";
    import { initCatalogPage } from "../assets/js/catalog/page-catalog.js";

    await includePartials();
    bootstrapCartUI();

    initCatalogPage({
      jsonPath: "/assets/data/premium300.json",
      activeNavKey: "premium300"
    });
  </script>
</body>
</html>
