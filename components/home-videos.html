<!-- components/home-videos.html -->
<section id="videos" class="section">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
      <div>
        <div class="kicker mb-2">Prova social</div>
        <h2 class="section-title">O QUE NOSSOS CLIENTES DIZEM</h2>
        <p class="section-sub">Depoimentos em vídeo — reais, diretos e sem roteiro.</p>
      </div>
    </div>

    <div id="videoCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#videoCarousel" data-bs-slide-to="0" class="active" aria-current="true"></button>
        <button type="button" data-bs-target="#videoCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#videoCarousel" data-bs-slide-to="2"></button>
      </div>

      <div class="carousel-inner">
        <div class="carousel-item active">
          <div class="video-frame">
            <div class="play-chip">
              <span class="play-dot">▶</span>
              <div>
                <div class="fw-bold">Depoimento #1</div>
                <div class="small-muted">Placeholder de vídeo (vai virar embed depois)</div>
              </div>
            </div>
          </div>
        </div>

        <div class="carousel-item">
          <div class="video-frame">
            <div class="play-chip">
              <span class="play-dot">▶</span>
              <div>
                <div class="fw-bold">Depoimento #2</div>
                <div class="small-muted">Placeholder de vídeo (vai virar embed depois)</div>
              </div>
            </div>
          </div>
        </div>

        <div class="carousel-item">
          <div class="video-frame">
            <div class="play-chip">
              <span class="play-dot">▶</span>
              <div>
                <div class="fw-bold">Depoimento #3</div>
                <div class="small-muted">Placeholder de vídeo (vai virar embed depois)</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#videoCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true" style="filter: invert(1) opacity(.75);"></span>
        <span class="visually-hidden">Anterior</span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#videoCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true" style="filter: invert(1) opacity(.75);"></span>
        <span class="visually-hidden">Próximo</span>
      </button>
    </div>
  </div>
</section>

<div class="divider"></div>
