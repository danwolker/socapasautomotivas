<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SoCapas — Capas Automotivas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/styles.css" rel="stylesheet">
</head>

<body>
  <!-- NAVBAR -->
  <div data-include="./components/navbar.html"></div>

  <!-- HOME SECTIONS -->
  <main>
    <div data-include="./components/home-hero.html"></div>
    <div data-include="./components/home-trust.html"></div>

    <div data-include="./components/home-featured.html"></div>
    <div data-include="./components/home-videos.html"></div>
    <div data-include="./components/home-protecao.html"></div>
    <div data-include="./components/home-historia.html"></div>
    <div data-include="./components/home-recomenda.html"></div>
    <div data-include="./components/home-bestsellers.html"></div>

    <div data-include="./components/home-contato.html"></div>
    <div data-include="./home-faq.html"></div>
  </main>

  <!-- FOOTER -->
  <div data-include="./components/footer.html"></div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Includes + App -->
  <script type="module">
    import { includePartials } from "./assets/js/includes.js";
    import "./assets/js/app.js";

    // 1) injeta os componentes
    await includePartials();

    // 2) depois que o HTML existe, dispare eventos para "re-inicializar" coisas que dependem do DOM
    // (o app.js atual roda no DOMContentLoaded; como injetamos depois, avisamos que a Home está pronta)
    window.dispatchEvent(new Event("partials:loaded"));
  </script>
</body>
</html>
